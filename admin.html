<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Admin Tavoli Tressette</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script src="firebase.js"></script>

<style>
* { box-sizing: border-box; }
body {
    font-family: Arial;
    background: #f0f2f5;
    margin:0;
    display:flex;
    justify-content:center;
}
.container {
    max-width:600px;
    width:100%;
    padding:10px;
}
.card {
    background:white;
    padding:15px;
    border-radius:10px;
    margin-bottom:20px;
    text-align:center;
}
input, button {
    width:100%;
    padding:10px;
    margin-bottom:10px;
}
button {
    background:#3498db;
    color:white;
    border:none;
    cursor:pointer;
}
.actions {
    display:flex;
    gap:5px;
}
.actions button { flex:1; }

#playersContainer {
    max-height:250px;
    overflow-y:auto;
    border:1px solid #ccc;
    border-radius:5px;
}
.player-item {
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:10px;
    border-bottom:1px solid #eee;
    cursor:pointer;
}
.player-item.selected { background:#eaf4ff; }
.player-order {
    background:#3498db;
    color:white;
    border-radius:50%;
    width:26px;
    height:26px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:0.8em;
}

#loginContainer { margin-top:100px; }
#loginError { color:red; margin-top:5px; }
</style>
</head>

<body>

<!-- LOGIN -->
<div class="container" id="loginContainer">
  <div class="card">
    <h3>Login Admin</h3>
 <div style="position: relative;">
  <input type="password" id="adminPassword" placeholder="Inserisci password" onkeydown="if(event.key==='Enter'){login();}">
  <span id="toggleEye" style="
      position:absolute;
      right:10px;
      top:50%;
      transform:translateY(-50%);
      cursor:pointer;
      user-select:none;
      font-size:18px;
  ">👁️</span>
</div>
    <button onclick="login()">Accedi</button>
    <div id="loginError"></div>
  </div>
</div>

<!-- CONTENUTO -->
<div class="container" id="mainContent" style="display:none;">

  <!-- HEADER -->
  <div style="display:flex; justify-content:flex-end; gap:5px; margin-bottom:10px;">
    <button onclick="togglePasswordBox()">Cambia Password Accesso</button>
    <button onclick="logout()">Logout</button>
  </div>

  <!-- NUOVI PULSANTI SPOSTATI QUI -->
  <div style="display:flex; justify-content:flex-end; gap:5px; margin-bottom:10px;">
    <button onclick="goToStorico()">Storico Admin</button>
    <button onclick="goToTavoli()">Vai ai Tavoli</button>
  </div>

  <!-- CAMBIO PASSWORD -->
  <div class="card" id="passwordBox" style="display:none;">
    <h3>Cambia Password Admin</h3>
    <input type="password" id="newAdminPassword" placeholder="Nuova password">
    <button onclick="changeAdminPassword()">Salva Nuova Password</button>
    <div id="passChangeMsg"></div>
  </div>

  <!-- CARD UNIFICATA -->
  <div class="card">
    <h2 id="formTitle">Crea Tavolo</h2>

<label>Nome Tavolo</label>
<input id="name" value="Tavolo 1">

<div style="display:flex; gap:5px;">
  <div style="flex:1;">
    <label>Limite punti</label>
    <input id="limit" type="number" value="121">
  </div>

  <div style="flex:1;">
    <label>Numero Vincitori</label>
    <input id="winners" type="number" value="5">
  </div>
</div>

<label>Password tavolo</label>
<input id="password" type="text" value="admin">

<label>Cerca giocatore</label>
<input id="searchPlayer" placeholder="🔍 Cerca..." oninput="filterPlayers()">

<div style="display:flex; gap:5px;">
  <div style="flex:1;">
    <label>Nome Giocatore da Inserire/Modificare</label>
    <input id="newPlayer">
  </div>

  <div style="flex:1; display:flex; align-items:flex-end;">
    <button onclick="addPlayer()">Inserisci / Modifica</button>
  </div>
</div>

    <div id="playersContainer"></div>

    <small>Clicca i giocatori per impostare l'ordine</small>

    <button onclick="saveTable()">💾 Salva Tavolo</button>
  </div>

  <!-- TAVOLI -->
  <div class="card">
    <h3>Tavoli creati</h3>
    <div id="tables"></div>
  </div>

</div>

<script>
let editingId = null;
let selectedOrder = [];
let allPlayers = [];
let editingPlayerId = null;

// LOGIN
function login(){
  const input = document.getElementById("adminPassword").value;

  db.ref("admin/password").once("value").then(snap => {
    if(input === snap.val()){
      document.getElementById("loginContainer").style.display="none";
      document.getElementById("mainContent").style.display="block";
      initPage();
    } else {
      document.getElementById("loginError").textContent="Password errata!";
    }
  });
}

// LOGOUT
function logout(){
  document.getElementById("mainContent").style.display="none";
  document.getElementById("loginContainer").style.display="block";
}

// PASSWORD
function togglePasswordBox(){
  passwordBox.style.display = passwordBox.style.display==="none"?"block":"none";
}

function changeAdminPassword(){
  const newPass = newAdminPassword.value.trim();
  if(!newPass) return alert("Inserisci password");
  db.ref("admin/password").set(newPass).then(()=>{
    passChangeMsg.textContent="Aggiornata!";
    passChangeMsg.style.color="green";
    newAdminPassword.value="";
  });
}

// NAVIGAZIONE
function goToStorico(){
  location.href="storicoAdmin.html";
}

function goToTavoli(){
  location.href="index.html";
}

// INIT
function initPage(){
  loadPlayersFromDB();
  loadTables();
}

// GIOCATORI
function loadPlayersFromDB(){
  db.ref("players").on("value", snap=>{
    const data = snap.val()||{};
    allPlayers = Object.entries(data).map(([id,p])=>({id,name:p.name}));
    renderPlayers(allPlayers);
  });
}

function renderPlayers(list){
  const container = document.getElementById("playersContainer");
  container.innerHTML = "";

  list.forEach(player => {
    const div = document.createElement("div");
    div.className = "player-item";

    const name = document.createElement("div");
    name.textContent = player.name;

    const actions = document.createElement("div");
    actions.style.display = "flex";
    actions.style.gap = "5px";

    const editBtn = document.createElement("button");
    editBtn.textContent = "✏️";
    editBtn.onclick = e => { e.stopPropagation(); editPlayer(player); };

    const delBtn = document.createElement("button");
    delBtn.textContent = "🗑️";
    delBtn.onclick = e => { e.stopPropagation(); deletePlayer(player.id); };

    actions.appendChild(editBtn);
    actions.appendChild(delBtn);

    const order = document.createElement("div");
    order.className="player-order";
    order.style.display="none";

    div.appendChild(name);
    div.appendChild(actions);
    div.appendChild(order);

    div.onclick = () => {
      const i = selectedOrder.indexOf(player.name);
      if(i===-1) selectedOrder.push(player.name);
      else selectedOrder.splice(i,1);
      aggiornaUI();
    };

    container.appendChild(div);
  });

  aggiornaUI();
}

function aggiornaUI(){
  Array.from(playersContainer.children).forEach(item=>{
    const nome=item.firstChild.textContent;
    const idx=selectedOrder.indexOf(nome);
    const orderBox=item.lastChild;

    if(idx!==-1){
      item.classList.add("selected");
      orderBox.style.display="flex";
      orderBox.textContent=idx+1;
    } else {
      item.classList.remove("selected");
      orderBox.style.display="none";
    }
  });
}

function addPlayer(){
  const nome = newPlayer.value.trim();

  if(!nome){
    alert("Il Campo nome del giocatore è vuoto!");
    return;
  }

  const id = editingPlayerId || ("player_" + Date.now());
  db.ref("players/" + id).set({name: nome});

  newPlayer.value = "";
  editingPlayerId = null;
}

function editPlayer(player){
  document.getElementById("newPlayer").value=player.name;
  editingPlayerId=player.id;
}

function deletePlayer(id){
  if(confirm("Eliminare giocatore?"))
    db.ref("players/"+id).remove();
}

function filterPlayers(){
  const t=searchPlayer.value.toLowerCase();
  renderPlayers(allPlayers.filter(p=>p.name.toLowerCase().includes(t)));
}

// SALVA TAVOLO
function saveTable(){
  const nameEl = document.getElementById("name");
  const limitEl = document.getElementById("limit");
  const winnersEl = document.getElementById("winners");
  const passwordEl = document.getElementById("password");

  if(selectedOrder.length===0){
    alert("Seleziona giocatori");
    return;
  }

  const id = editingId || ("table_" + Date.now());

  db.ref("tables/" + id).set({
    name: nameEl.value,
    players: selectedOrder.map(p => ({ name: p })),
    limit: Number(limitEl.value),
    winners: Number(winnersEl.value),
    password: passwordEl.value
  })
  .then(()=>{
    editingId = null;
    selectedOrder = [];
    aggiornaUI();

    nameEl.value="Tavolo 1";
    limitEl.value=121;
    winnersEl.value=3;
    passwordEl.value="";
    document.getElementById("formTitle").textContent="Crea Tavolo";

    alert("Salvato!");
  })
  .catch(()=>{
    alert("Errore salvataggio tavolo");
  });
}

// CARICA TAVOLI
function loadTables(){
  db.ref("tables").on("value", snap=>{
    const data = snap.val() || {};
    tables.innerHTML = "";

    for(let id in data){
      const t = data[id];

      const list = (t.players||[])
        .map((p,i) => `<div style="text-align:left;">${i+1}. ${p.name}</div>`)
        .join("");

      tables.innerHTML += `
      <div class="card">
        <b>${t.name}</b>
        <div>${list}</div>
        <div>Limite: ${t.limit} | Vincitori: ${t.winners}</div>
        <div class="actions">
          <button onclick="editTable('${id}')">Modifica</button>
          <button onclick="deleteTable('${id}')">Elimina</button>
        </div>
      </div>`;
    }
  });
}

function editTable(id){
  db.ref("tables/"+id).once("value").then(snap=>{
    const t=snap.val();

    editingId=id;
    name.value=t.name;
    limit.value=t.limit;
    winners.value=t.winners;
    password.value=t.password;

    selectedOrder=(t.players||[]).map(p=>p.name);
    aggiornaUI();

    document.getElementById("formTitle").textContent="Modifica Tavolo";
    scrollTo(0,0);
  });
}

function deleteTable(id){
  if(confirm("Eliminare?"))
    db.ref("tables/"+id).remove();
}

const toggleEye = document.getElementById("toggleEye");
const adminPasswordInput = document.getElementById("adminPassword");

toggleEye.addEventListener("click", ()=>{
  if(adminPasswordInput.type === "password"){
    adminPasswordInput.type = "text";
    toggleEye.textContent = "🙈"; // occhio chiuso
  } else {
    adminPasswordInput.type = "password";
    toggleEye.textContent = "👁️"; // occhio aperto
  }
});
</script>

</body>
</html>
