<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Admin Tavoli Tressette</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script src="firebase.js"></script>

<!-- Excel -->
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
* { box-sizing: border-box; }

body {
  font-family: Arial;
  background: #f0f2f5;
  margin: 0;
  display: flex;
  justify-content: center;
}

.container {
  max-width: 550px;
  width: 100%;
  padding: 10px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.card {
  background: white;
  padding: 15px;
  border-radius: 10px;
  margin-bottom: 20px;
  width: 100%;
  text-align: center;
}

input, button {
  width: 100%;
  padding: 10px;
  margin-bottom: 10px;
}

button {
  background: #3498db;
  color: white;
  border: none;
  cursor: pointer;
}

.actions {
  display: flex;
  gap: 5px;
}

.actions button {
  flex: 1;
}

#tables {
  width: 100%;
}

/* Lista giocatori */
#playersContainer {
  max-height: 250px;
  overflow-y: auto;
  border: 1px solid #ccc;
  border-radius: 5px;
}

.player-item {
  display: flex;
  justify-content: space-between;
  padding: 10px;
  border-bottom: 1px solid #eee;
  cursor: pointer;
}

.player-item.selected {
  background: #eaf4ff;
}

.player-order {
  background: #3498db;
  color: white;
  border-radius: 50%;
  width: 26px;
  height: 26px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.8em;
}

/* Lista tavoli */
.players-list {
  list-style: none;
  padding: 0;
  margin: 0 auto;   /* mantiene centrata la lista nella card */
  max-width: 90%;   /* larghezza contenuta */
  text-align: left; /* allinea nomi a sinistra */
}
</style>
</head>

<body>

<div class="container">

<div class="card">
<h2>Crea / Modifica Tavolo</h2>

<input id="name" value="Tavolo 1">
<input type="file" id="fileInput">
<div id="playersContainer"></div>
<input id="limit" type="number" value="81">
<input id="winners" type="number" value="3">
<input id="password" type="password">
<button onclick="saveTable()">Salva Tavolo</button>
</div>

<div class="card">
<h3>Tavoli creati</h3>
<div id="tables"></div>
</div>

</div>

<script>
// ===== VARIABILI =====
let editingId = null;
let selectedOrder = [];
const playersContainer = document.getElementById("playersContainer");
const tablesDiv = document.getElementById("tables");

// ===== POPOLA GIOCATORI =====
function populatePlayers(playersArray){
  playersContainer.innerHTML = "";
  selectedOrder = [];

  playersArray.forEach(nome => {
    const div = document.createElement("div");
    div.className = "player-item";

    const name = document.createElement("div");
    name.textContent = nome;

    const order = document.createElement("div");
    order.className = "player-order";
    order.style.display = "none";

    div.appendChild(name);
    div.appendChild(order);

    div.onclick = () => {
      const i = selectedOrder.indexOf(nome);
      if(i === -1) selectedOrder.push(nome);
      else selectedOrder.splice(i,1);
      aggiornaUI();
    };

    playersContainer.appendChild(div);
  });
}

// ===== AGGIORNA UI =====
function aggiornaUI(){
  Array.from(playersContainer.children).forEach(item => {
    const nome = item.firstChild.textContent;
    const orderBox = item.lastChild;
    const idx = selectedOrder.indexOf(nome);

    if(idx !== -1){
      item.classList.add("selected");
      orderBox.style.display = "flex";
      orderBox.textContent = idx + 1;
    } else {
      item.classList.remove("selected");
      orderBox.style.display = "none";
    }
  });
}

// ===== CARICA EXCEL =====
fileInput.onchange = function(e){
  const file = e.target.files[0];
  if(!file) return;

  const reader = new FileReader();
  reader.onload = function(evt){
    const data = new Uint8Array(evt.target.result);
    const wb = XLSX.read(data, {type:'array'});
    const sheet = wb.Sheets[wb.SheetNames[0]];
    const json = XLSX.utils.sheet_to_json(sheet);
    const arr = [];
    json.forEach(r => { if(r.Giocatore) arr.push(String(r.Giocatore)); });
    localStorage.setItem("lastPlayers", JSON.stringify(arr));
    populatePlayers(arr);
  };
  reader.readAsArrayBuffer(file);
};

// ===== AUTOLOAD =====
window.onload = () => {
  const p = localStorage.getItem("lastPlayers");
  if(p) populatePlayers(JSON.parse(p));
};

// ===== SALVA TAVOLO =====
function saveTable(){
  if(selectedOrder.length === 0){ alert("Seleziona giocatori"); return; }

  const id = editingId || ("table_" + Date.now());
  const nome = document.getElementById("name").value;
  const limitVal = Number(document.getElementById("limit").value);
  const winnersVal = Number(document.getElementById("winners").value);
  const passwordVal = document.getElementById("password").value;

  db.ref("tables/"+id).once("value").then(snap => {
    const old = snap.val() || {};

    db.ref("tables/"+id).set({
      name: nome || "Tavolo",
      players: selectedOrder.map(p => String(p)),
      limit: limitVal || 81,
      winners: winnersVal || 3,
      password: passwordVal || "",
      game: old.game || null,
      editor: old.editor || null
    });

    editingId = null;
    selectedOrder = [];
    aggiornaUI();
    alert("Tavolo salvato!");
  });
}

// ===== ELIMINA =====
function deleteTable(id){
  if(confirm("Eliminare?")){ db.ref("tables/"+id).remove(); }
}

// ===== MODIFICA =====
function editTable(id){
  db.ref("tables/"+id).once("value").then(snap => {
    const t = snap.val();
    if(!t) return;
    editingId = id;
    document.getElementById("name").value = t.name || "";
    document.getElementById("limit").value = t.limit || 81;
    document.getElementById("winners").value = t.winners || 3;
    document.getElementById("password").value = t.password || "";
    selectedOrder = (t.players || []).map(p => typeof p === "object" ? String(p.name || "") : String(p));
    aggiornaUI();
    scrollTo(0,0);
  });
}

// ===== VISUALIZZA =====
db.ref("tables").on("value", snap => {
  const tables = snap.val() || {};
  tablesDiv.innerHTML = "";
  for(let id in tables){
    const t = tables[id];
    const list = (t.players || []).map((p,idx) => {
      let nome = typeof p === "object" ? p.name : p;
      return `<li>${idx+1}. ${nome}</li>`;
    }).join("");
    tablesDiv.innerHTML += `
      <div class="card">
        <b>${t.name}</b>
        <ul class="players-list">${list}</ul>
        <div>Limite: ${t.limit} | Vincitori: ${t.winners}</div>
        <div class="actions">
          <button onclick="editTable('${id}')">Modifica</button>
          <button onclick="deleteTable('${id}')">Elimina</button>
        </div>
      </div>`;
  }
});
</script>

</body>
</html>
